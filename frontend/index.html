<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Web Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>AI Web Automation Agent</h1>

        <p>Ask the agent to perform a web task</p>

        <textarea id="taskInput" placeholder="Example: create gmail account"></textarea>

        <button onclick="runAgent()">Run Task</button>

        <div id="responseBox">
            <h3>Agent Response</h3>
            <pre id="response"></pre>
        </div>

    </div>

<script src="script.js"></script>

</body>

</html>
